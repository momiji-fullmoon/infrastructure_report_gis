services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: tameike
      POSTGRES_PASSWORD: tameike
      POSTGRES_DB: tameike
    ports: ["5432:5432"]
  redis:
    image: redis:7
    ports: ["6379:6379"]
  minio:
    image: minio/minio
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports: ["9000:9000","9001:9001"]
  api:
    build: ./apps/api
    env_file: .env.example
    ports: ["8000:8000"]
    depends_on: [db]
  web:
    build: ./apps/web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports: ["3000:3000"]
    depends_on: [api]
