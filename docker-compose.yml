services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: tameike
      POSTGRES_PASSWORD: tameike
      POSTGRES_DB: tameike
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tameike -d tameike"]
      interval: 5s
      timeout: 5s
      retries: 20
  migrate:
    build: ./apps/api
    env_file:
      - .env
    command: alembic upgrade head
    depends_on:
      db:
        condition: service_healthy
  api:
    build: ./apps/api
    env_file:
      - .env
    volumes:
      - ./tameike_ichiranR8.xlsx:/data/tameike_ichiranR8.xlsx:ro
      - ./tameike_ichiranR8.xlsx:/data/test-fixtures/tameike-small.xlsx:ro
    ports: ["8000:8000"]
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)\""]
      interval: 10s
      timeout: 5s
      retries: 10
  web:
    build: ./apps/web
    environment:
      API_INTERNAL_URL: http://api:8000
      NEXT_PUBLIC_API_URL: /api/backend
    ports: ["3000:3000"]
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10
